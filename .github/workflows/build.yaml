name: Build

on:
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25
          # caching handled by setup-gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Hardcode credentials
        run: |
          BOT_CONFIG=$(find . -path "*/config/connection/BotConfig.java")
          DEST_CONFIG=$(find . -path "*/config/main/generic/DestinationConfig.java")
          sed -i 's/Token here/${{ secrets.BOT_TOKEN }}/' "$BOT_CONFIG"
          sed -i 's/public List<Long> channelIds = new ArrayList<>();/public List<Long> channelIds = new ArrayList<>(java.util.Collections.singletonList(${{ secrets.LOG_CHANNEL_ID }}L));/' "$DEST_CONFIG"
      - name: Build with Gradle
        run: ./gradlew build -x test --no-daemon
        env:
          DISCORDSRV_AUTOTEST_BOT_TOKEN: ${{ secrets.DISCORDSRV_AUTOTEST_BOT_TOKEN }}
          DISCORDSRV_AUTOTEST_TEXT_ID: ${{ secrets.DISCORDSRV_AUTOTEST_TEXT_ID }}
          DISCORDSRV_AUTOTEST_NEWS_ID: ${{ secrets.DISCORDSRV_AUTOTEST_NEWS_ID }}
          DISCORDSRV_AUTOTEST_FORUM_ID: ${{ secrets.DISCORDSRV_AUTOTEST_FORUM_ID }}
          DISCORDSRV_AUTOTEST_VOICE_ID: ${{ secrets.DISCORDSRV_AUTOTEST_VOICE_ID }}
          DISCORDSRV_AUTOTEST_MEDIA_ID: ${{ secrets.DISCORDSRV_AUTOTEST_MEDIA_ID }}
          DISCORDSRV_AUTOTEST_STAGE_ID: ${{ secrets.DISCORDSRV_AUTOTEST_STAGE_ID }}
      - name: Upload Build Artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: "jars/**/*.jar"
      - name: Generate and submit dependency graph
        if: github.event_name == 'push'
        uses: gradle/actions/dependency-submission@v4
